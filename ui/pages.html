<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Darkweb Monitor · Targets</title>
  <link rel="stylesheet" href="/ui/assets/styles.css" />
</head>
<body>
<script src="/ui/assets/common.js"></script>
<script>
installPage({
  pageKey: 'targets',
  heroEyebrow: 'Collection Coverage',
  heroTitle: 'Targets Overview',
  heroDesc: '큐 상태, 마지막 큐잉, 마지막 수집, seed URL을 기준으로 운영 상태를 한눈에 확인',
  heroMeta: ['queued 분리', 'seed URL 표시', 'last fetched 정리', '운영 판단 강화'],
  actionHtml: '<button class="btn primary" id="heroRefreshBtn">Refresh</button>',
  sidebarExtra: `
    <div class="card-title">Target Filters</div>
    <label class="field-label" for="queueFilter">Queue</label>
    <select id="queueFilter" class="control">
      <option value="">전체</option>
      <option value="queued">queued only</option>
      <option value="not_queued">not queued</option>
    </select>

    <label class="field-label" for="stateFilter">State</label>
    <select id="stateFilter" class="control">
      <option value="">전체</option>
      <option value="never">never fetched</option>
      <option value="fetched">fetched</option>
      <option value="recent">recent active</option>
      <option value="stale">stale</option>
    </select>

    <label class="field-label" for="searchBox">검색</label>
    <input id="searchBox" class="control" type="text" placeholder="label / name / url / host" />`,
  mainHtml: `
    <div class="hidden empty" id="errorBox"></div>

    <style>
      :root {
        --target-ui-height: 38px;
        --target-ui-font: 13px;
        --target-ui-radius: 999px;
        --target-ui-padding-x: 14px;
      }

      .targets-top-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        margin-left: auto;
      }

      .targets-top-actions .control,
      .targets-top-actions .pill {
        width: auto;
        min-width: 0;
      }

      .pagination {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .pagination .control,
      .pagination .pill {
        height: var(--target-ui-height);
        font-size: var(--target-ui-font);
        border-radius: var(--target-ui-radius);
        padding: 0 var(--target-ui-padding-x);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
        box-sizing: border-box;
        white-space: nowrap;
      }

      .pagination .control {
        background: rgba(148, 163, 184, 0.14);
        color: #d7e3ff;
        border: 1px solid rgba(148, 163, 184, 0.12);
        transition: background .18s ease, opacity .18s ease;
      }

      .pagination .control:hover {
        background: rgba(148, 163, 184, 0.22);
      }

      .pagination .control:disabled {
        opacity: 0.42;
        cursor: not-allowed;
      }

      .pagination .pill {
        background: rgba(59, 130, 246, 0.16);
        color: #cfe0ff;
        border: 1px solid rgba(96, 165, 250, 0.18);
        font-weight: 600;
      }

      .pagination select.control {
        min-width: 108px;
        padding-right: 34px;
        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;
        background-image:
          linear-gradient(45deg, transparent 50%, #cfe0ff 50%),
          linear-gradient(135deg, #cfe0ff 50%, transparent 50%);
        background-position:
          calc(100% - 18px) calc(50% - 2px),
          calc(100% - 12px) calc(50% - 2px);
        background-size: 6px 6px, 6px 6px;
        background-repeat: no-repeat;
      }

      .pagination .control option {
        color: #111827;
        background: #ffffff;
      }

      .target-main-cell {
        max-width: 320px;
        word-break: break-word;
      }

      .target-url-cell {
        max-width: 360px;
        word-break: break-all;
      }

      .muted-sub {
        margin-top: 4px;
        font-size: 12px;
        opacity: 0.72;
      }

      .queue-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        display: inline-block;
        margin-right: 6px;
        vertical-align: middle;
      }

      .queue-dot.on {
        background: #22c55e;
        box-shadow: 0 0 0 4px rgba(34,197,94,.14);
      }

      .queue-dot.off {
        background: #94a3b8;
        box-shadow: 0 0 0 4px rgba(148,163,184,.14);
      }

      .quick-note {
        font-size: 12px;
        opacity: .8;
      }

      @media (max-width: 900px) {
        .targets-top-actions {
          width: 100%;
          justify-content: flex-start;
          margin-left: 0;
        }
      }

      @media (max-width: 700px) {
        .pagination .control,
        .pagination .pill {
          height: 34px;
          font-size: 12px;
          padding: 0 12px;
        }

        .pagination select.control {
          min-width: 96px;
        }

        .target-main-cell,
        .target-url-cell {
          max-width: 220px;
        }
      }
    </style>

    <section class="grid-3" id="targetStats"></section>

    <section class="panel">
      <div class="panel-head">
        <div>
          <div class="panel-title">Targets</div>
          <div class="panel-sub">운영 판단이 가능하도록 queued 여부, 마지막 큐잉, 마지막 수집, seed URL을 분리해서 표시</div>
        </div>

        <div class="targets-top-actions pagination">
          <button class="control" id="prevBtnTop" type="button">Prev</button>
          <span class="pill" id="pagePillTop">Page 1 / 1</span>
          <button class="control" id="nextBtnTop" type="button">Next</button>

          <select id="pageSizeSelect" class="control" title="rows per page">
            <option value="10">10 rows</option>
            <option value="30">30 rows</option>
            <option value="50" selected>50 rows</option>
            <option value="100">100 rows</option>
            <option value="200">200 rows</option>
            <option value="500">500 rows</option>
          </select>

          <span class="pill" id="targetCountPill">Total 0</span>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Target</th>
              <th>Queued</th>
              <th>Last Queued</th>
              <th>Last Fetched</th>
              <th>Seed URL</th>
              <th>State</th>
            </tr>
          </thead>
          <tbody id="targetsBody"></tbody>
        </table>
        <div class="empty hidden" id="targetsEmpty">표시할 target이 없다.</div>
      </div>

      <div class="pagination">
        <button class="control" id="prevBtn" type="button">Prev</button>
        <span class="pill" id="pagePill">Page 1 / 1</span>
        <button class="control" id="nextBtn" type="button">Next</button>
      </div>
    </section>`
});

let rows = [];
let currentPage = 1;
let pageSize = 50;

function toDateSafe(v) {
  const d = new Date(v || 0);
  return Number.isNaN(d.getTime()) ? null : d;
}

function hoursDiff(date) {
  if (!date) return null;
  return (Date.now() - date.getTime()) / 36e5;
}

function targetState(row) {
  const fetched = toDateSafe(row.last_fetched_at);
  if (!fetched) return 'never';
  const diff = hoursDiff(fetched);
  if (diff !== null && diff <= 24) return 'recent';
  if (diff !== null && diff > 24 * 7) return 'stale';
  return 'fetched';
}

function stateBadge(state) {
  if (state === 'never') return 'other';
  if (state === 'recent') return 'ok';
  if (state === 'stale') return 'fail';
  return 'info';
}

function filteredRows() {
  const queue = document.getElementById('queueFilter').value.trim().toLowerCase();
  const state = document.getElementById('stateFilter').value.trim().toLowerCase();
  const q = document.getElementById('searchBox').value.trim().toLowerCase();

  return rows.filter(r => {
    const queueOk =
      !queue ||
      (queue === 'queued' ? !!r.is_queued : !r.is_queued);

    const rowState = targetState(r);
    const stateOk = !state || rowState === state;

    const joined = [
      r.id,
      r.label,
      r.name,
      r.host,
      r.seed_url,
      r.url,
      r.last_error_message
    ].map(v => String(v || '').toLowerCase()).join(' ');

    return queueOk && stateOk && (!q || joined.includes(q));
  });
}

function totalPages(list) {
  return Math.max(1, Math.ceil(list.length / pageSize));
}

function pagedRows(list) {
  const start = (currentPage - 1) * pageSize;
  return list.slice(start, start + pageSize);
}

function syncPageState(list) {
  const total = totalPages(list);
  if (currentPage < 1) currentPage = 1;
  if (currentPage > total) currentPage = total;

  const label = `Page ${currentPage} / ${total}`;
  document.getElementById('pagePill').textContent = label;
  document.getElementById('pagePillTop').textContent = label;

  const prevDisabled = currentPage <= 1;
  const nextDisabled = currentPage >= total;

  document.getElementById('prevBtn').disabled = prevDisabled;
  document.getElementById('prevBtnTop').disabled = prevDisabled;
  document.getElementById('nextBtn').disabled = nextDisabled;
  document.getElementById('nextBtnTop').disabled = nextDisabled;
}

function renderStats() {
  const queued = rows.filter(r => r.is_queued).length;
  const neverFetched = rows.filter(r => targetState(r) === 'never').length;
  const recentActive = rows.filter(r => targetState(r) === 'recent').length;
  const stale = rows.filter(r => targetState(r) === 'stale').length;
  const hosts = new Set(rows.map(r => String(r.host || '').trim()).filter(Boolean)).size;

  renderMetricCards(document.getElementById('targetStats'), [
    { label: 'Targets', value: rows.length, foot: '현재 로드 수' },
    { label: 'Queued', value: queued, foot: 'is_queued=true' },
    { label: 'Never Fetched', value: neverFetched, foot: 'last_fetched_at 없음' },
    { label: 'Recent Active', value: recentActive, foot: '24시간 이내' },
    { label: 'Stale', value: stale, foot: '7일 초과 미수집' },
    { label: 'Hosts', value: hosts, foot: 'host 기준' }
  ]);
}

function renderTable() {
  const list = filteredRows();
  syncPageState(list);
  const visible = pagedRows(list);

  document.getElementById('targetCountPill').textContent = `Total ${list.length}`;

  document.getElementById('targetsBody').innerHTML = visible.map(r => {
    const state = targetState(r);
    const seed = r.seed_url || r.url || '-';
    const targetLabel = r.label || r.name || `Target ${r.id}`;

    return `
      <tr>
        <td>${escapeHtml(r.id)}</td>

        <td class="target-main-cell">
          <div>${escapeHtml(targetLabel)}</div>
          <div class="small muted">${escapeHtml(r.host || '-')}</div>
        </td>

        <td>
          <span class="badge ${r.is_queued ? 'ok' : 'other'}">
            <span class="queue-dot ${r.is_queued ? 'on' : 'off'}"></span>
            ${r.is_queued ? 'queued' : 'idle'}
          </span>
        </td>

        <td>
          <div>${escapeHtml(fmtDate(r.last_queued_at))}</div>
          <div class="muted-sub">${escapeHtml(fmtAgo(r.last_queued_at))}</div>
        </td>

        <td>
          <div>${escapeHtml(fmtDate(r.last_fetched_at))}</div>
          <div class="muted-sub">${escapeHtml(fmtAgo(r.last_fetched_at))}</div>
        </td>

        <td class="target-url-cell">
          ${seed && seed !== '-'
            ? `<a class="link" target="_blank" href="${escapeHtml(seed)}">${escapeHtml(seed)}</a>`
            : '<span class="muted">-</span>'}
        </td>

        <td>
          <span class="badge ${stateBadge(state)}">${escapeHtml(state)}</span>
          ${r.last_error_message ? `<div class="quick-note">${escapeHtml(r.last_error_message)}</div>` : ''}
        </td>
      </tr>
    `;
  }).join('');

  document.getElementById('targetsEmpty').classList.toggle('hidden', visible.length !== 0);
}

async function loadTargets() {
  rows = await getJson(API.targets);
  renderStats();
  renderTable();
}

function resetToFirstPage() {
  currentPage = 1;
  renderTable();
}

['queueFilter', 'stateFilter'].forEach(id => {
  document.getElementById(id).addEventListener('change', resetToFirstPage);
});

document.getElementById('searchBox').addEventListener('input', resetToFirstPage);

document.getElementById('pageSizeSelect').addEventListener('change', (e) => {
  pageSize = Number(e.target.value) || 50;
  currentPage = 1;
  renderTable();
});

document.getElementById('prevBtn').addEventListener('click', () => {
  if (currentPage > 1) {
    currentPage -= 1;
    renderTable();
  }
});

document.getElementById('nextBtn').addEventListener('click', () => {
  const total = totalPages(filteredRows());
  if (currentPage < total) {
    currentPage += 1;
    renderTable();
  }
});

document.getElementById('prevBtnTop').addEventListener('click', () => {
  document.getElementById('prevBtn').click();
});

document.getElementById('nextBtnTop').addEventListener('click', () => {
  document.getElementById('nextBtn').click();
});

attachRefresh(() => guardedLoad(loadTargets));
guardedLoad(loadTargets);
</script>
</body>
</html>
