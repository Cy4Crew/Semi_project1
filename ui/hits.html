<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Darkweb Monitor · Hits</title>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
<script src="./assets/common.js"></script>
<script>

installPage({
  pageKey: 'hits',
  heroEyebrow: 'Detection Events',
  heroTitle: 'Hits Console',
  heroDesc: '탐지 이벤트를 클릭하면 Investigation으로 이동하며, hover 시 Quick Peek 제공',

  mainHtml: `
    <div class="hidden empty" id="errorBox"></div>

    <section class="panel">
      <div class="panel-head">
        <div>
          <div class="panel-title">Hits Table</div>
          <div class="panel-sub">클릭 시 조사 화면으로 이동</div>
        </div>

        <div class="pagination">
          <button id="prevBtn">Prev</button>
          <span id="pagePill">Page 1</span>
          <button id="nextBtn">Next</button>

          <select id="pageSize">
            <option value="10">10</option>
            <option value="20" selected>20</option>
            <option value="50">50</option>
          </select>

          <span class="pill" id="rowCount">0 rows</span>
        </div>
      </div>

      <div class="toolbar">
        <input id="searchBox" class="control toolbar-grow" type="text" placeholder="검색 (url / matched / type)" />
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Type</th>
              <th>Matched</th>
              <th>URL</th>
              <th>First Seen</th>
              <th>Last Seen</th>
            </tr>
          </thead>
          <tbody id="hitsBody"></tbody>
        </table>

        <div class="empty hidden" id="emptyBox">데이터 없음</div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div class="panel-title">Quick Peek</div>
      </div>
      <div id="detailBox" class="mini-desc">
        행에 마우스를 올리면 상세 정보 표시
      </div>
    </section>
  `
});

let state = {
  page: 1,
  size: 20,
  rows: [],
  filtered: []
};

function filterRows() {
  const q = document.getElementById('searchBox').value.toLowerCase();

  state.filtered = state.rows.filter(r => {
    const text = [
      r.id,
      r.watch_type,
      r.matched_value,
      r.url
    ].map(v => String(v || '').toLowerCase()).join(' ');

    return !q || text.includes(q);
  });
}

function renderDetail(row) {
  const box = document.getElementById('detailBox');

  if (!row) {
    box.innerHTML = '행에 마우스를 올리면 상세 정보 표시';
    return;
  }

  box.innerHTML = `
    <div><b>ID:</b> ${escapeHtml(row.id)}</div>
    <div><b>Type:</b> ${escapeHtml(row.watch_type || '-')}</div>
    <div><b>Matched:</b> ${escapeHtml(row.matched_value || '-')}</div>
    <div><b>URL:</b> ${escapeHtml(row.url || '-')}</div>
    <div><b>First Seen:</b> ${escapeHtml(fmtDate(row.first_seen_at))}</div>
    <div><b>Last Seen:</b> ${escapeHtml(fmtDate(row.last_seen_at))}</div>
    <div style="margin-top:10px;">
      <a class="btn primary" href="/ui/investigation.html?hit=${row.id}">Open Investigation</a>
    </div>
  `;
}

function renderTable() {
  const body = document.getElementById('hitsBody');

  body.innerHTML = state.filtered.map(row => `
    <tr class="clickable" data-id="${row.id}">
      <td>${escapeHtml(row.id)}</td>
      <td><span class="badge type">${escapeHtml(row.watch_type || '-')}</span></td>
      <td>${escapeHtml(row.matched_value || '-')}</td>
      <td>${escapeHtml(row.url || '-')}</td>
      <td>${escapeHtml(fmtDate(row.first_seen_at))}</td>
      <td>${escapeHtml(fmtDate(row.last_seen_at))}</td>
    </tr>
  `).join('');

  document.getElementById('rowCount').textContent = `${state.filtered.length} rows`;
  document.getElementById('emptyBox').classList.toggle('hidden', state.filtered.length !== 0);

  bindEvents();
}

function bindEvents() {
  document.querySelectorAll('#hitsBody tr').forEach(tr => {

    const row = state.rows.find(r => String(r.id) === tr.dataset.id);

    tr.addEventListener('mouseenter', () => {
      renderDetail(row);
    });

    tr.addEventListener('click', () => {
      window.location.href = `/ui/investigation.html?hit=${row.id}`;
    });

  });
}

async function load() {
  const data = await getJson(API.hits(state.page, state.size));

  state.rows = data;
  filterRows();
  renderTable();

  document.getElementById('pagePill').innerText = `Page ${state.page}`;
}

document.getElementById('searchBox').addEventListener('input', () => {
  filterRows();
  renderTable();
});

document.getElementById('prevBtn').addEventListener('click', () => {
  if (state.page > 1) {
    state.page--;
    load();
  }
});

document.getElementById('nextBtn').addEventListener('click', () => {
  state.page++;
  load();
});

document.getElementById('pageSize').addEventListener('change', (e) => {
  state.size = Number(e.target.value);
  state.page = 1;
  load();
});

guardedLoad(load);

</script>
</body>
</html>
