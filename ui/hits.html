<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Darkweb Monitor · Hits</title>
  <link rel="stylesheet" href="/ui/assets/styles.css" />
</head>
<body>
<script src="/ui/assets/common.js"></script>
<script>
installPage({
  pageKey: 'hits',
  heroEyebrow: 'Detection Review',
  heroTitle: 'Hits Console',
  heroDesc: '탐지 이벤트를 리스트가 아니라 이동 가능한 작업 화면으로 정리했다. 클릭하면 선택을 저장하고, 같은 IOC·같은 URL·관련 알림 기준으로 바로 Investigation으로 이어진다.',
  heroMeta: ['flow refined', 'priority badges', 'investigation handoff', 'theme aware'],
  actionHtml: '<button class="btn primary" id="heroRefreshBtn">Refresh</button>',
  sidebarExtra: `
    <div class="card-title">Hit Filters</div>
    <label class="field-label" for="hitTypeFilter">Type</label>
    <select id="hitTypeFilter" class="control"><option value="">전체</option></select>
    <label class="field-label" for="hitLabelFilter">Label</label>
    <select id="hitLabelFilter" class="control"><option value="">전체</option></select>
    <label class="field-label" for="searchBox">검색</label>
    <input id="searchBox" class="control" type="text" placeholder="URL / matched / label" />`,
  mainHtml: `
    <div class="hidden empty" id="errorBox"></div>
    <div id="selectedBanner"></div>
    <section class="split">
      <section class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">Recent Hits</div>
            <div class="panel-sub">행 클릭 시 Investigation으로 이동하고, 마우스를 올리면 Quick Peek이 바로 바뀐다. View 버튼은 현재 페이지에서 선택 고정용이다.</div>
          </div>
          <span class="pill" id="hitCountPill">0 rows</span>
        </div>
        <div class="toolbar">
          <input id="inlineSearch" class="control toolbar-grow" type="text" placeholder="추가 검색" />
          <span class="pill" id="pagePill">Page 1</span>
        </div>
        <div class="table-wrap">
          <table class="table-tight">
            <thead>
              <tr><th>ID</th><th>Type</th><th>Label</th><th>Matched</th><th>URL</th><th>Seen</th></tr>
            </thead>
            <tbody id="hitsBody"></tbody>
          </table>
          <div class="empty hidden" id="hitsEmpty">표시할 히트가 없다.</div>
        </div>
        <div class="pagination">
          <button class="control" id="prevBtn" type="button">Prev</button>
          <button class="control" id="nextBtn" type="button">Next</button>
        </div>
      </section>

      <aside class="detail-card">
        <div class="card-title">Quick Peek</div>
        <div id="detailBox" class="mini-desc">왼쪽 표에 마우스를 올리면 Quick Peek이 즉시 바뀐다. 행을 클릭하면 Investigation으로 이동하고, View 버튼은 현재 페이지에서 선택을 고정한다.</div>
      </aside>
    </section>`
});

const state = { page: 1, rows: [], alerts: [], pages: [], extracted: [], selected: null, targets: [] };

function filteredRows() {
  const q = (document.getElementById('searchBox').value + ' ' + document.getElementById('inlineSearch').value).trim().toLowerCase();
  const type = document.getElementById('hitTypeFilter').value.trim().toLowerCase();
  const label = document.getElementById('hitLabelFilter').value.trim().toLowerCase();
  return state.rows.filter(r => {
    const typeOk = !type || String(r.watch_type || '').toLowerCase() === type;
    const labelOk = !label || String(r.label || '').toLowerCase() === label;
    const joined = [r.id, r.watch_type, r.label, r.matched_value, r.url, r.title, r.fingerprint, r.target_id].map(v => String(v || '').toLowerCase()).join(' ');
    const qOk = !q || joined.includes(q);
    return typeOk && labelOk && qOk;
  });
}

function relatedSets(row) {
  const sameValue = state.rows.filter(x => String(x.matched_value || '').toLowerCase() === String(row.matched_value || '').toLowerCase());
  const sameUrl = state.rows.filter(x => String(x.url || '') === String(row.url || ''));
  const sameTarget = state.rows.filter(x => String(x.target_id || '') === String(row.target_id || '') && String(row.target_id || '') !== '');
  const samePageExtracted = state.extracted.filter(x => String(x.page_id) === String(row.page_id));
  const relatedAlerts = state.alerts.filter(a => String(a.hit_id) === String(row.id) || String(a.matched_value || '').toLowerCase() === String(row.matched_value || '').toLowerCase() || String(a.url || '') === String(row.url || ''));
  const page = state.pages.find(p => String(p.id) === String(row.page_id));
  const target = state.targets.find(t => String(t.id) === String(row.target_id));
  return { sameValue, sameUrl, sameTarget, samePageExtracted, relatedAlerts, page, target };
}

function previewImage(path) {
  const src = normalizeEvidence(path);
  if (!src) return '<div class="mini-desc">screenshot 없음</div>';
  return `<a class="preview-box" href="${escapeHtml(src)}" target="_blank"><img src="${escapeHtml(src)}" alt="screenshot preview" loading="lazy" /></a>`;
}


function repeatCount(row) {
  return state.rows.filter(x => String(x.matched_value || '').toLowerCase() === String(row.matched_value || '').toLowerCase()).length;
}
function sameUrlCount(row) {
  return state.rows.filter(x => String(x.url || '') === String(row.url || '')).length;
}
function isNewRow(row) {
  const t = new Date(row.last_seen_at || row.first_seen_at || 0).getTime();
  if (!t) return false;
  return (Date.now() - t) < 1000 * 60 * 60 * 24;
}
function persistSelection(row) {
  sessionStorage.setItem('selectedHitId', String(row.id));
  sessionStorage.setItem('selectedHit', JSON.stringify(row));
}

function renderRelatedHits(list, title = '없음') {
  if (!list.length) return `<div class="mini-desc">${title}</div>`;
  return `<div class="related-list">${list.slice(0, 6).map(item => `
    <div class="related-item clickable" data-hit-id="${escapeHtml(item.id)}">
      <div class="related-head">
        <div class="related-main">#${escapeHtml(item.id)} · ${escapeHtml(item.watch_type || '-')}</div>
        <span class="pill">${escapeHtml(fmtAgo(item.last_seen_at || item.first_seen_at))}</span>
      </div>
      <div class="related-sub">${escapeHtml(item.url || '-')}</div>
    </div>`).join('')}</div>`;
}

function renderAlertsList(list) {
  if (!list.length) return '<div class="mini-desc">관련 alert 없음</div>';
  return `<div class="related-list">${list.slice(0, 6).map(item => `
    <div class="related-item">
      <div class="related-head">
        <div class="related-main">${escapeHtml(item.channel || '-')} · <span class="badge ${pickStatusClass(item.status)}">${escapeHtml(item.status || '-')}</span></div>
        <span class="pill">${escapeHtml(fmtDate(item.created_at || item.sent_at))}</span>
      </div>
      <div class="related-sub">${escapeHtml(item.error_message || item.url || item.matched_value || '-')}</div>
    </div>`).join('')}</div>`;
}

function renderExtractedList(list) {
  if (!list.length) return '<div class="mini-desc">같은 page에서 추출된 항목 없음</div>';
  return `<div class="related-list">${list.slice(0, 8).map(item => `
    <div class="related-item">
      <div class="related-head">
        <div class="related-main">${escapeHtml(item.type || '-')}</div>
        <span class="pill">#${escapeHtml(item.id)}</span>
      </div>
      <div class="related-sub">${escapeHtml(item.normalized || item.raw || '-')}</div>
    </div>`).join('')}</div>`;
}

function bindRelatedClicks() {
  document.querySelectorAll('[data-hit-id]').forEach(el => {
    el.addEventListener('click', () => {
      const row = state.rows.find(x => String(x.id) === String(el.dataset.hitId));
      if (!row) return;
      state.selected = row;
      saveSelectedHit(row);
      renderSelected();
      renderDetail(row);
      renderTable();
    });
  });
}

function renderSelected() {
  const box = document.getElementById('selectedBanner');
  if (!state.selected) {
    box.innerHTML = '';
    return;
  }
  box.innerHTML = renderSelectedBanner(state.selected, `
    <a class="mini-btn" href="/ui/investigation.html?hit=${encodeURIComponent(state.selected.id)}">Open Investigation</a>
    ${state.selected.url ? `<a class="mini-btn" href="${escapeHtml(state.selected.url)}" target="_blank">Open URL</a>` : ''}
  `);
}

function renderDetail(row) {
  if (!row) {
    document.getElementById('detailBox').innerHTML = '왼쪽 표에 마우스를 올리면 Quick Peek이 즉시 바뀐다. 행을 클릭하면 Investigation으로 이동하고, View 버튼은 현재 페이지에서 선택을 고정한다.';
    return;
  }
  const { sameValue, sameUrl, sameTarget, samePageExtracted, relatedAlerts, page, target } = relatedSets(row);
  const flags = buildHitFlags(row, state.rows, state.alerts);
  document.getElementById('detailBox').innerHTML = `
    <div class="detail-stack">
      <div class="detail-title-wrap">
        <div>
          <div class="detail-title">${escapeHtml(row.matched_value || 'Matched value')}</div>
          <div class="mini-desc">${escapeHtml(row.title || row.url || '-')}</div>
          ${renderFlagBadges(flags)}
        </div>
        <div class="row-actions">
          <a class="mini-btn" href="/ui/investigation.html?hit=${encodeURIComponent(row.id)}">Investigate</a>
          ${page && page.screenshot_path ? `<a class="mini-btn" href="${escapeHtml(normalizeEvidence(page.screenshot_path))}" target="_blank">VIEW</a>` : ''}
        </div>
      </div>

      <div class="stat-grid-compact">
        <div class="stat-card-compact"><div class="mini-kicker">Same IOC</div><div class="num">${sameValue.length}</div></div>
        <div class="stat-card-compact"><div class="mini-kicker">Same URL</div><div class="num">${sameUrl.length}</div></div>
        <div class="stat-card-compact"><div class="mini-kicker">Same Target</div><div class="num">${sameTarget.length}</div></div>
        <div class="stat-card-compact"><div class="mini-kicker">Alerts</div><div class="num">${relatedAlerts.length}</div></div>
      </div>

      <div class="section-card">
        <div class="section-title">Core Context</div>
        <div class="info-grid">
          <div class="info-item"><div class="info-label">Hit ID</div><div class="info-value mono">${escapeHtml(row.id)}</div></div>
          <div class="info-item"><div class="info-label">Type</div><div class="info-value">${escapeHtml(row.watch_type || '-')}</div></div>
          <div class="info-item"><div class="info-label">Label</div><div class="info-value">${escapeHtml(row.label || '-')}</div></div>
          <div class="info-item"><div class="info-label">Target</div><div class="info-value">${escapeHtml(target?.label || target?.name || row.target_id || '-')}</div></div>
          <div class="info-item"><div class="info-label">First Seen</div><div class="info-value">${escapeHtml(fmtDate(row.first_seen_at))}</div></div>
          <div class="info-item"><div class="info-label">Last Seen</div><div class="info-value">${escapeHtml(fmtDate(row.last_seen_at))}</div></div>
        </div>
      </div>

      <div class="section-card evidence-preview">
        <div class="section-title">Evidence Preview</div>
        ${previewImage(page ? page.screenshot_path : row.screenshot_path)}
        <div class="tag-row">${page ? evidenceLinks(page) : evidenceLinks(row)}</div>
      </div>

      <div class="section-card">
        <div class="section-title">Same IOC Hits</div>
        ${renderRelatedHits(sameValue.filter(item => String(item.id) !== String(row.id)), '같은 IOC hit 없음')}
      </div>

      <div class="section-card">
        <div class="section-title">Same Target Hits</div>
        ${renderRelatedHits(sameTarget.filter(item => String(item.id) !== String(row.id)), '같은 target hit 없음')}
      </div>

      <div class="section-card">
        <div class="section-title">Related Alerts</div>
        ${renderAlertsList(relatedAlerts)}
      </div>

      <div class="section-card">
        <div class="section-title">Same Page Extracted</div>
        ${renderExtractedList(samePageExtracted)}
      </div>
    </div>`;
  bindRelatedClicks();
}

function rowMarkup(row) {
  const flags = buildHitFlags(row, state.rows, state.alerts);
  const selected = state.selected && String(state.selected.id) === String(row.id);
  return `
    <tr class="clickable ${selected ? 'highlight' : ''}" data-id="${escapeHtml(row.id)}">
      <td>${escapeHtml(row.id)}</td>
      <td><span class="badge type">${escapeHtml(row.watch_type || '-')}</span></td>
      <td>${escapeHtml(row.label || '-')}</td>
      <td>
        <div class="matched-value truncate-2">${escapeHtml(row.matched_value || '-')}</div>
        ${renderFlagBadges(flags)}
        <div class="cell-actions"><button type="button" class="mini-btn js-peek" data-id="${escapeHtml(row.id)}">VIEW</button></div>
      </td>
      <td>${row.url ? `<a class="link url-cell" href="${escapeHtml(row.url)}" target="_blank" onclick="event.stopPropagation()">${escapeHtml(row.url)}</a>` : '<span class="muted">-</span>'}</td>
      <td>${escapeHtml(fmtDate(row.last_seen_at || row.first_seen_at))}</td>
    </tr>`;
}

function renderTable() {
  const rows = filteredRows();
  document.getElementById('hitCountPill').textContent = `${rows.length} rows`;
  document.getElementById('pagePill').textContent = `Page ${state.page}`;
  document.getElementById('hitsBody').innerHTML = rows.map(rowMarkup).join('');
  document.getElementById('hitsEmpty').classList.toggle('hidden', rows.length !== 0);
  document.getElementById('prevBtn').disabled = state.page <= 1;
  document.getElementById('nextBtn').disabled = state.rows.length < PAGE_SIZE;

  Array.from(document.querySelectorAll('#hitsBody tr')).forEach(tr => {
    const row = state.rows.find(x => String(x.id) === tr.dataset.id);
    if (!row) return;

    tr.addEventListener('mouseenter', (e) => {
      if (e.target.closest('.js-peek') || e.target.closest('a')) return;
      renderDetail(row);
    });

    tr.addEventListener('mouseleave', () => {
      renderDetail(state.selected);
    });

    tr.addEventListener('focusin', () => {
      renderDetail(row);
    });

    tr.addEventListener('click', (e) => {
      if (e.target.closest('.js-peek') || e.target.closest('a')) return;
      state.selected = row;
      saveSelectedHit(row);
      renderSelected();
      gotoInvestigation(row);
    });
  });

  document.querySelectorAll('.js-peek').forEach(btn => {
    btn.addEventListener('mouseenter', () => {
      const row = state.rows.find(x => String(x.id) === String(btn.dataset.id));
      if (row) renderDetail(row);
    });
    btn.addEventListener('mouseleave', () => {
      renderDetail(state.selected);
    });
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const row = state.rows.find(x => String(x.id) === String(btn.dataset.id));
      state.selected = row || null;
      saveSelectedHit(state.selected);
      renderSelected();
      renderDetail(state.selected);
      renderTable();
    });
  });
}

async function loadHits() {
  const [rows, alerts, pages, extracted, targets] = await Promise.all([
    getJson(API.hits(state.page, PAGE_SIZE)),
    getJson(API.alerts(1, 120)),
    getJson(API.pages(140)),
    getJson(API.extracted(180)),
    getJson(API.targets)
  ]);
  state.rows = rows;
  state.alerts = alerts;
  state.pages = pages;
  state.extracted = extracted;
  state.targets = targets;
  fillSelect(document.getElementById('hitTypeFilter'), uniqueValues(state.rows, 'watch_type'));
  fillSelect(document.getElementById('hitLabelFilter'), uniqueValues(state.rows, 'label'));

  const saved = loadSelectedHitId();
  if (saved) state.selected = state.rows.find(r => String(r.id) === String(saved)) || state.rows[0] || null;
  else if (!state.selected && state.rows[0]) state.selected = state.rows[0];

  renderSelected();
  renderDetail(state.selected);
  renderTable();
}

['hitTypeFilter','hitLabelFilter','searchBox','inlineSearch'].forEach(id => document.getElementById(id).addEventListener(id.includes('Filter') ? 'change' : 'input', () => {
  renderTable();
}));
document.getElementById('prevBtn').addEventListener('click', () => { if (state.page > 1) { state.page -= 1; guardedLoad(loadHits); } });
document.getElementById('nextBtn').addEventListener('click', () => { if (state.rows.length === PAGE_SIZE) { state.page += 1; guardedLoad(loadHits); } });
attachRefresh(() => guardedLoad(loadHits));
guardedLoad(loadHits);
</script>
</body>
</html>
