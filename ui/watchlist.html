<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Darkweb Monitor · Watchlist</title>
  <link rel="stylesheet" href="/ui/assets/styles.css" />
</head>
<body>
<script src="/ui/assets/common.js"></script>
<script>

installPage({
  pageKey: 'watchlist',
  heroEyebrow: 'Detection Rules',
  heroTitle: 'Watchlist',
  heroDesc: '탐지 규칙을 확인하고, 어떤 패턴이 어떤 hit를 만들어내는지 점검',
  heroMeta: ['exact + regex', 'multi-pattern', 'priority 확인'],
  actionHtml: '<button class="btn primary" id="heroRefreshBtn">Refresh</button>',

  sidebarExtra: `
    <div class="card-title">Watchlist Filters</div>

    <label class="field-label" for="typeFilter">Type</label>
    <select id="typeFilter" class="control">
      <option value="">전체</option>
    </select>

    <label class="field-label" for="regexFilter">Regex</label>
    <select id="regexFilter" class="control">
      <option value="">전체</option>
      <option value="true">regex</option>
      <option value="false">exact</option>
    </select>

    <label class="field-label" for="searchBox">검색</label>
    <input id="searchBox" class="control" type="text" placeholder="pattern / label" />`,

  mainHtml: `
    <div class="hidden empty" id="errorBox"></div>

    <section class="grid-3" id="watchStats"></section>

    <section class="panel">
      <div class="panel-head">
        <div>
          <div class="panel-title">Watchlist Rules</div>
          <div class="panel-sub">탐지 규칙 목록 (읽기 전용)</div>
        </div>

        <div class="pagination">
          <button id="prevBtn">Prev</button>
          <span id="pagePill">Page 1</span>
          <button id="nextBtn">Next</button>

          <select id="pageSize">
            <option value="10">10</option>
            <option value="30" selected>30</option>
            <option value="50">50</option>
          </select>

          <span class="pill" id="rowCount">0 rows</span>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Type</th>
              <th>Label</th>
              <th>Pattern</th>
              <th>Regex</th>
              <th>Priority</th>
            </tr>
          </thead>
          <tbody id="watchBody"></tbody>
        </table>

        <div class="empty hidden" id="emptyBox">데이터 없음</div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div class="panel-title">Rule Detail</div>
      </div>
      <div id="detailBox" class="mini-desc">행 선택 시 상세 표시</div>
    </section>
  `
});

let state = {
  page: 1,
  size: 30,
  rows: [],
  filtered: [],
  selected: null
};

function filterRows() {
  const type = document.getElementById('typeFilter').value.toLowerCase();
  const regex = document.getElementById('regexFilter').value;
  const q = document.getElementById('searchBox').value.toLowerCase();

  state.filtered = state.rows.filter(r => {

    const typeOk = !type || String(r.type || '').toLowerCase() === type;

    const regexOk =
      !regex ||
      (regex === 'true' ? r.is_regex : !r.is_regex);

    const joined = [
      r.pattern,
      r.label,
      r.type
    ].map(v => String(v || '').toLowerCase()).join(' ');

    return typeOk && regexOk && (!q || joined.includes(q));
  });
}

function renderStats() {
  const regexCount = state.rows.filter(r => r.is_regex).length;
  const exactCount = state.rows.length - regexCount;

  const typeCounts = countBy(state.rows, 'type');

  renderMetricCards(document.getElementById('watchStats'), [
    { label: 'Rules', value: state.rows.length, foot: '전체 규칙 수' },
    { label: 'Regex', value: regexCount, foot: '정규식 규칙' },
    { label: 'Exact', value: exactCount, foot: '문자열 매칭' },
    { label: 'Types', value: Object.keys(typeCounts).length, foot: 'type 종류 수' }
  ]);
}

function renderDetail(row) {
  const box = document.getElementById('detailBox');

  if (!row) {
    box.innerHTML = '행 선택 시 상세 표시';
    return;
  }

  box.innerHTML = `
    <div><b>ID:</b> ${escapeHtml(row.id)}</div>
    <div><b>Type:</b> ${escapeHtml(row.type || '-')}</div>
    <div><b>Label:</b> ${escapeHtml(row.label || '-')}</div>
    <div><b>Pattern:</b> <span class="mono">${escapeHtml(row.pattern || '-')}</span></div>
    <div><b>Regex:</b> ${row.is_regex ? 'true' : 'false'}</div>
    <div><b>Priority:</b> ${escapeHtml(row.priority ?? '-')}</div>
  `;
}

function renderTable() {
  const body = document.getElementById('watchBody');

  body.innerHTML = state.filtered.map(row => `
    <tr class="clickable ${state.selected && state.selected.id === row.id ? 'highlight' : ''}" data-id="${row.id}">
      <td>${escapeHtml(row.id)}</td>
      <td>${escapeHtml(row.type || '-')}</td>
      <td>${escapeHtml(row.label || '-')}</td>
      <td class="mono">${escapeHtml(row.pattern || '-')}</td>
      <td><span class="badge ${row.is_regex ? 'warn' : 'info'}">${row.is_regex ? 'regex' : 'exact'}</span></td>
      <td>${escapeHtml(row.priority ?? '-')}</td>
    </tr>
  `).join('');

  document.getElementById('rowCount').textContent = `${state.filtered.length} rows`;
  document.getElementById('emptyBox').classList.toggle('hidden', state.filtered.length !== 0);

  bindEvents();
}

function bindEvents() {
  document.querySelectorAll('#watchBody tr').forEach(tr => {

    const row = state.rows.find(r => String(r.id) === tr.dataset.id);

    tr.addEventListener('click', () => {
      state.selected = row;
      renderTable();
      renderDetail(row);
    });

  });
}

async function load() {
  const data = await getJson(API.watchlist);

  state.rows = data;

  fillSelect(document.getElementById('typeFilter'), uniqueValues(state.rows, 'type'));

  filterRows();
  renderStats();
  renderTable();

  if (state.rows[0]) {
    state.selected = state.rows[0];
    renderDetail(state.selected);
  }

  document.getElementById('pagePill').innerText = `Page ${state.page}`;
}

document.getElementById('typeFilter').addEventListener('change', () => {
  filterRows();
  renderTable();
});

document.getElementById('regexFilter').addEventListener('change', () => {
  filterRows();
  renderTable();
});

document.getElementById('searchBox').addEventListener('input', () => {
  filterRows();
  renderTable();
});

attachRefresh(() => guardedLoad(load));
guardedLoad(load);

</script>
</body>
</html>
