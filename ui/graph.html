<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Darkweb Monitor · Graph</title>
  <link rel="stylesheet" href="/ui/assets/styles.css" />
</head>
<body>
<script src="/ui/assets/common.js"></script>
<script>
installPage({
  pageKey: 'graph',
  heroEyebrow: 'Correlation View',
  heroTitle: 'Relation Graph',
  heroDesc: '그래프 노드에 별도 hitbox를 넣어 hover와 클릭이 안정적으로 먹게 바꿨다. 이제 노드 위에 올리면 커지고, 클릭도 바로 반응한다.',
  heroMeta: ['dynamic height', 'type → IOC → URL → target', 'repeated focus'],
  actionHtml: '<button class="btn primary" id="heroRefreshBtn">Refresh</button>',
  sidebarExtra: `
    <div class="card-title">Graph Filters</div>
    <label class="field-label" for="typeFilter">Watch Type</label>
    <select id="typeFilter" class="control"><option value="">전체</option></select>
    <label class="field-label" for="targetFilter">Target</label>
    <select id="targetFilter" class="control"><option value="">전체</option></select>
    <label class="field-label" for="graphMode">Mode</label>
    <select id="graphMode" class="control">
      <option value="repeat">Repeated 중심</option>
      <option value="recent">Recent 중심</option>
    </select>`,
  mainHtml: `
    <div class="hidden empty" id="errorBox"></div>
    <section class="grid-2">
      <section class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">Relation Stage</div>
            <div class="panel-sub">노드를 클릭하면 우측에서 관련 hit와 alert를 보여준다</div>
          </div>
          <span class="pill" id="graphSummaryPill">0 nodes</span>
        </div>
        <div class="graph-toolbar">
          <button class="btn ghost" id="reloadGraphBtn" type="button">Reload Layout</button>
        </div>
        <div class="graph-stage" id="graphStage">
          <svg id="graphSvg" class="graph-svg" viewBox="0 0 1240 680" preserveAspectRatio="xMidYMin meet"></svg>
        </div>
        <div class="graph-hint">최근 데이터만 사용한다. 데이터가 많아지면 세로 간격을 자동으로 줄여서 내부 스크롤 없이 적당한 높이를 유지한다.</div>
      </section>
      <aside class="detail-card">
        <div class="card-title">Node Detail</div>
        <div id="nodeDetail" class="mini-desc">그래프의 노드를 선택하면 관련 hit와 연결 정보를 보여준다.</div>
      </aside>
    </section>`
});

const state = { hits: [], alerts: [], targets: [], selected: null, graph: { nodes: [], links: [] } };

function shortLabel(value, max = 24) {
  const s = String(value || '');
  return s.length > max ? s.slice(0, max - 1) + '…' : s;
}
function safeTime(row) {
  return new Date(row.last_seen_at || row.first_seen_at || 0).getTime() || 0;
}
function enrichHits(rows) {
  const repeatMap = {};
  rows.forEach(r => {
    const key = String(r.matched_value || '').trim().toLowerCase();
    if (!key) return;
    repeatMap[key] = (repeatMap[key] || 0) + 1;
  });
  return rows.map(r => ({ ...r, repeat_count: repeatMap[String(r.matched_value || '').trim().toLowerCase()] || 0 }));
}
function filteredHits() {
  const type = document.getElementById('typeFilter').value.trim().toLowerCase();
  const target = document.getElementById('targetFilter').value.trim();
  const mode = document.getElementById('graphMode').value;
  let rows = enrichHits(state.hits).filter(h => {
    const typeOk = !type || String(h.watch_type || '').toLowerCase() === type;
    const targetOk = !target || String(h.target_id || '') === target;
    return typeOk && targetOk;
  });
  rows.sort((a, b) => {
    if (mode === 'repeat' && (b.repeat_count || 0) !== (a.repeat_count || 0)) {
      return (b.repeat_count || 0) - (a.repeat_count || 0);
    }
    return safeTime(b) - safeTime(a);
  });
  if (mode === 'repeat') {
    rows = rows.filter(r => (r.repeat_count || 0) > 1).slice(0, 18);
    if (!rows.length) rows = enrichHits(state.hits).slice(0, 12);
  } else {
    rows = rows.slice(0, 14);
  }
  return rows;
}
function targetName(id) {
  const found = state.targets.find(t => String(t.id) === String(id));
  return found?.label || found?.name || `Target ${id || 'undefined'}`;
}
function buildStableGraph(rows) {
  const nodes = [];
  const links = [];
  const map = new Map();
  const addNode = (id, kind, label, extra = {}) => {
    if (map.has(id)) return map.get(id);
    const n = { id, kind, label, ...extra };
    map.set(id, n);
    nodes.push(n);
    return n;
  };
  const addLink = (source, target, kind) => {
    const key = `${source}|${target}|${kind}`;
    if (links.find(l => l.key === key)) return;
    links.push({ key, source, target, kind });
  };

  rows.forEach(row => {
    const typeId = `type:${String(row.watch_type || 'unknown').toLowerCase()}`;
    const iocKey = String(row.matched_value || '').trim() || `hit:${row.id}`;
    const iocId = `ioc:${iocKey.toLowerCase()}`;
    const urlValue = String(row.url || '-').trim() || '-';
    const urlId = `url:${urlValue}`;
    const targetIdValue = String(row.target_id || 'undefined');
    const targetId = `target:${targetIdValue}`;

    addNode(typeId, 'type', String(row.watch_type || 'unknown'));
    addNode(iocId, 'ioc', iocKey, { repeatCount: row.repeat_count || 1 });
    addNode(urlId, 'url', urlValue, { url: urlValue });
    addNode(targetId, 'target', targetName(targetIdValue), { target_id: targetIdValue });
    addLink(typeId, iocId, 'typed');
    addLink(iocId, urlId, 'seen_on');
    addLink(urlId, targetId, 'belongs_to');
  });

  const columns = { type: 130, ioc: 390, url: 760, target: 1080 };
  const columnOrders = ['type', 'ioc', 'url', 'target'];
  const yStart = 110;
  const maxCount = Math.max(...columnOrders.map(kind => nodes.filter(n => n.kind === kind).length), 1);

  const preferredHeight = 900;
  const minStep = 56;
  const maxStep = 84;
  const available = Math.max(260, preferredHeight - yStart - 110);
  const dynamicStep = maxCount > 1 ? Math.floor(available / (maxCount - 1)) : maxStep;
  const yStep = Math.max(minStep, Math.min(maxStep, dynamicStep));

  columnOrders.forEach(kind => {
    const list = nodes.filter(n => n.kind === kind);
    list.forEach((n, idx) => {
      n.x = columns[kind];
      n.y = yStart + idx * yStep;
    });
  });

  const contentHeight = yStart + (maxCount - 1) * yStep + 140;
  const height = Math.max(700, Math.min(980, contentHeight));
  return { nodes, links, height, contentHeight, yStep, maxCount };
}

function setActiveGraphNode(nodeId = null) {
  const svg = document.getElementById('graphSvg');
  const nodeEls = Array.from(svg.querySelectorAll('[data-node-id]'));
  const linkEls = Array.from(svg.querySelectorAll('[data-link-key]'));
  if (!nodeId) {
    nodeEls.forEach(el => el.classList.remove('is-active', 'is-dim'));
    linkEls.forEach(el => el.classList.remove('is-active', 'is-dim'));
    return;
  }
  const activeLinks = new Set();
  state.graph.links.forEach(link => {
    if (link.source === nodeId || link.target === nodeId) activeLinks.add(link.key);
  });
  const connectedNodes = new Set([nodeId]);
  state.graph.links.forEach(link => {
    if (link.source === nodeId) connectedNodes.add(link.target);
    if (link.target === nodeId) connectedNodes.add(link.source);
  });
  nodeEls.forEach(el => {
    const isActive = el.dataset.nodeId === nodeId;
    const isConnected = connectedNodes.has(el.dataset.nodeId);
    el.classList.toggle('is-active', isActive);
    el.classList.toggle('is-dim', !isConnected);
  });
  linkEls.forEach(el => {
    const isActive = activeLinks.has(el.dataset.linkKey);
    el.classList.toggle('is-active', isActive);
    el.classList.toggle('is-dim', !isActive);
  });
}

function renderNodeDetail(node) {
  if (!node) {
    document.getElementById('nodeDetail').innerHTML = '그래프의 노드를 선택하면 관련 hit와 연결 정보를 보여준다.';
    return;
  }
  let relatedHits = [];
  if (node.kind === 'ioc') {
    relatedHits = state.hits.filter(h => String(h.matched_value || '').trim().toLowerCase() === String(node.label || '').trim().toLowerCase());
  } else if (node.kind === 'url') {
    relatedHits = state.hits.filter(h => String(h.url || '') === String(node.url || node.label || ''));
  } else if (node.kind === 'target') {
    relatedHits = state.hits.filter(h => String(h.target_id || '') === String(node.target_id || ''));
  } else if (node.kind === 'type') {
    relatedHits = state.hits.filter(h => String(h.watch_type || '').toLowerCase() === String(node.label || '').toLowerCase());
  }
  relatedHits = enrichHits(relatedHits).sort((a, b) => safeTime(b) - safeTime(a)).slice(0, 8);
  const relatedAlerts = state.alerts.filter(a => {
    const mv = String(a.matched_value || '').trim().toLowerCase();
    return relatedHits.some(h => String(h.matched_value || '').trim().toLowerCase() === mv);
  }).slice(0, 6);

  document.getElementById('nodeDetail').innerHTML = `
    <div class="detail-title">${escapeHtml(node.label)}</div>
    <div class="detail-meta">
      <div class="meta-row"><div class="meta-label">Kind</div><div><span class="badge info">${escapeHtml(node.kind)}</span></div></div>
      ${node.repeatCount ? `<div class="meta-row"><div class="meta-label">Repeated</div><div>${escapeHtml(node.repeatCount)}</div></div>` : ''}
      <div class="meta-row"><div class="meta-label">Related Hits</div><div>${escapeHtml(relatedHits.length)}</div></div>
      <div class="meta-row"><div class="meta-label">Related Alerts</div><div>${escapeHtml(relatedAlerts.length)}</div></div>
    </div>
    <div class="list-tight" style="margin-top:14px">
      ${relatedHits.map(h => `
        <div class="list-item">
          <div class="mini-kicker">${escapeHtml(h.watch_type || '-')}</div>
          <div class="mini-desc">${escapeHtml(shortLabel(h.matched_value || '-', 44))}</div>
          <div class="mini-desc">${h.url ? `<a class="link" target="_blank" href="${escapeHtml(h.url)}">${escapeHtml(shortLabel(h.url, 54))}</a>` : '-'}</div>
          <div class="detail-cta" style="margin-top:8px"><a class="btn sm" href="/ui/investigation.html?hit=${encodeURIComponent(h.id)}">Open Investigation</a></div>
        </div>`).join('') || '<div class="empty">관련 hit 없음</div>'}
    </div>
  `;
}
function renderGraph() {
  const rows = filteredHits();
  const graph = buildStableGraph(rows);
  state.graph = graph;
  document.getElementById('graphSummaryPill').textContent = `${graph.nodes.length} nodes · ${graph.links.length} links`;

  const stage = document.getElementById('graphStage');
  const svg = document.getElementById('graphSvg');
  stage.style.minHeight = `${graph.height}px`;
  stage.style.height = `${graph.height}px`;
  svg.style.height = `${graph.height}px`;
  svg.setAttribute('viewBox', `0 0 1240 ${graph.height}`);

  const columnTitles = [['TYPE', 130], ['IOC', 390], ['URL', 760], ['TARGET', 1080]];
  svg.innerHTML = `
    <g>${columnTitles.map(([label, x]) => `<text class="graph-col-label" x="${x}" y="48" text-anchor="middle">${label}</text>`).join('')}</g>
    <g class="links">
      ${graph.links.map(l => {
        const s = graph.nodes.find(n => n.id === l.source);
        const t = graph.nodes.find(n => n.id === l.target);
        if (!s || !t) return '';
        return `<path class="graph-link" data-link-key="${escapeHtml(l.key)}" d="M ${s.x} ${s.y} C ${(s.x+t.x)/2} ${s.y}, ${(s.x+t.x)/2} ${t.y}, ${t.x} ${t.y}" fill="none"></path>`;
      }).join('')}
    </g>
    <g class="nodes">
      ${graph.nodes.map(n => {
        const fill = relationColor(n.kind);
        const radius = n.kind === 'ioc' ? 22 : 17;
        const label = shortLabel(n.label, n.kind === 'url' ? 32 : 24);
        const count = n.kind === 'ioc' && n.repeatCount ? `<text class="graph-node-count" x="${n.x}" y="${n.y + 4}" text-anchor="middle">${escapeHtml(n.repeatCount)}</text>` : '';
        return `
          <g class="graph-node" data-node-id="${escapeHtml(n.id)}" data-radius="${radius}">
            <circle class="graph-hitbox" cx="${n.x}" cy="${n.y}" r="${radius + 10}" fill="rgba(0,0,0,0.001)" stroke="transparent"></circle>
            <circle cx="${n.x}" cy="${n.y}" r="${radius}" fill="${fill}" fill-opacity="${n.kind === 'ioc' ? '.94' : '.84'}" stroke="rgba(255,255,255,.18)"></circle>
            ${count}
            <text class="graph-node-label" x="${n.x}" y="${n.y + radius + 17}" text-anchor="middle">${escapeHtml(label)}</text>
          </g>`;
      }).join('')}
    </g>
  `;
  svg.querySelectorAll('[data-node-id]').forEach(el => {
    const hitbox = el.querySelector('.graph-hitbox');
    const nodeId = el.dataset.nodeId;
    const onEnter = (ev) => {
      ev.stopPropagation();
      el.classList.add('is-hover');
      setActiveGraphNode(nodeId);
    };
    const onLeave = (ev) => {
      ev.stopPropagation();
      el.classList.remove('is-hover');
      setActiveGraphNode(state.selected ? state.selected.id : null);
    };
    const onClick = (ev) => {
      ev.preventDefault();
      ev.stopPropagation();
      const node = graph.nodes.find(n => n.id === nodeId);
      state.selected = node || null;
      svg.querySelectorAll('[data-node-id]').forEach(n => n.classList.remove('is-active'));
      el.classList.add('is-active');
      setActiveGraphNode(nodeId);
      renderNodeDetail(state.selected);
    };

    if (hitbox) {
      hitbox.addEventListener('mouseenter', onEnter);
      hitbox.addEventListener('mouseleave', onLeave);
      hitbox.addEventListener('click', onClick);
      hitbox.style.pointerEvents = 'all';
      hitbox.style.cursor = 'pointer';
    } else {
      el.addEventListener('mouseenter', onEnter);
      el.addEventListener('mouseleave', onLeave);
      el.addEventListener('click', onClick);
    }
  });

  svg.querySelectorAll('[data-node-id]').forEach(n => n.classList.remove('is-active'));
  if (state.selected) {
    const current = Array.from(svg.querySelectorAll('[data-node-id]')).find(n => n.dataset.nodeId === state.selected.id);
    if (current) current.classList.add('is-active');
  }
  setActiveGraphNode(state.selected ? state.selected.id : null);
  renderNodeDetail(state.selected ? graph.nodes.find(n => n.id === state.selected.id) : null);
}
async function load() {
  const [hits, alerts, targets] = await Promise.all([
    getJson(API.hits(1, 150)),
    getJson(API.alerts(1, 150)),
    getJson(API.targets),
  ]);
  state.hits = Array.isArray(hits) ? hits : [];
  state.alerts = Array.isArray(alerts) ? alerts : [];
  state.targets = Array.isArray(targets) ? targets : [];
  fillSelect(document.getElementById('typeFilter'), uniqueValues(state.hits, 'watch_type'));
  fillSelect(document.getElementById('targetFilter'), uniqueValues(state.hits, 'target_id'));
  renderGraph();
}

attachRefresh(() => guardedLoad(load));
document.getElementById('typeFilter').addEventListener('change', renderGraph);
document.getElementById('targetFilter').addEventListener('change', renderGraph);
document.getElementById('graphMode').addEventListener('change', renderGraph);
document.getElementById('reloadGraphBtn').addEventListener('click', renderGraph);
guardedLoad(load);
</script>
</body>
</html>
