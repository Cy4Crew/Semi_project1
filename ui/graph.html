<style>

Max Depth</label><select id="fDep" class="control"><option value="3">3</option><option value="5">5</option><option value="10" selected>10</option><option value="999">All</option></select><label class="field-label" for="fSrc">Source</label><select id="fSrc" class="control"><option value="">전체</option><option value="darkweb">다크웹</option><option value="telegram">텔레그램</option><option value="tx_analysis">TX분석</option></select>',
mainHtml:'<div class="hidden empty" id="errorBox"></div><section class="panel"><div class="panel-head"><div><div class="panel-title">분석 시작</div><div class="panel-sub">지갑 주소 또는 TX 해시로 BFS 탐색</div></div></div><div class="rg" style="margin-bottom:10px"><label><input type="radio" name="iT" value="address" checked/> 지갑 주소</label><label><input type="radio" name="iT" value="txid"/> TX 해시</label></div><div class="in-row"><input id="aIn" class="control" type="text" placeholder="bc1q..., 0x... 또는 TX 해시"/><button class="btn primary" id="aBtn">분석 시작</button><button class="btn ghost" id="aAdd">DB 추가</button></div></section><section class="metrics" id="wM"></section><section class="grid-2"><section class="panel" id="graphPanel" style="padding-bottom:12px"><div class="panel-head"><div><div class="panel-title">Wallet Flow Graph</div><div class="panel-sub">클릭=상세 | 드래그=이동 | 스크롤=확대 | 자동 간격 정리</div></div><span class="pill" id="gSt">0</span></div><div class="graph-toolbar"><button class="btn ghost" id="rzBtn">Reset</button><button class="btn ghost" id="fsBtn">Focus</button></div><div class="gcw" id="gC" style="height:660px"><canvas id="gCv"></canvas><div class="g-zoom"><button id="ziBtn">+</button><button id="zoBtn">-</button></div><div class="g-tt" id="gTt"></div><div class="g-hint">drag=move scroll=zoom click=select</div></div><div class="g-legend"><div class="g-li"><span>🔴</span>판매자</div><div class="g-li"><span>🟡</span>추적</div><div class="g-li"><span>🏦</span>거래소</div><div class="g-li"><span>🔀</span>믹서</div><div class="g-li"><span>🤝</span>다중서명</div><div class="g-li"><span>⚠️</span>고위험</div><div class="g-li"><span>🚫</span>블랙</div><div class="g-li"><span>🔗</span>연결점</div><div class="g-li"><span>◻️</span>송금자</div></div><div class="g-legend"><div class="chain-sep"><span class="chain-dot btc"></span>BTC</div><div class="chain-sep"><span class="chain-dot eth"></span>ETH</div><div class="chain-sep"><span class="chain-dot bsc"></span>BSC</div><div class="chain-sep"><span class="chain-dot polygon"></span>POLYGON</div><div class="chain-sep"><span class="chain-dot arbitrum"></span>ARB</div><div class="chain-sep"><span class="chain-dot base"></span>BASE</div><div class="chain-sep"><span class="chain-dot optimism"></span>OP</div><div class="chain-sep"><span class="chain-dot avalanche"></span>AVAX</div></div></section><aside class="detail-card"><div class="card-title">Wallet Detail</div><div id="wD">노드를 클릭하면 지갑 상세 정보가 표시됩니다.</div></aside></section><section class="grid-2"><section class="panel"><div class="panel-head"><div><div class="panel-title">Transaction Activity</div><div class="panel-sub">Tracked wallet transaction history</div></div><span class="pill" id="evCnt">0</span></div><div class="ev-tbl" id="evTbl"></div><div class="pg"><button id="evPrev">Prev</button><span id="evPage">1</span><button id="evNext">Next</button></div></section><section class="panel"><div class="panel-head"><div><div class="panel-title">Recent Wallets</div><div class="panel-sub">Newly registered addresses</div></div><span class="pill" id="rcCnt">0</span></div><div class="ev-tbl" id="rcTbl"></div><div class="pg"><button id="rcPrev">Prev</button><span id="rcPage">1</span><button id="rcNext">Next</button></div></section></section>'});

/* ═══════════════════════════════════════
   Event delegation (NO inline onclick)
   ═══════════════════════════════════════ */
document.addEventListener('click', function(evt) {
  var el = evt.target;
  var addrEl = el.closest('[data-addr]');
  if (addrEl) {
    evt.preventDefault();
    var addr = addrEl.getAttribute('data-addr');
    if (addr) {
      var gp = document.getElementById('graphPanel');
      if (gp) gp.scrollIntoView({behavior:'smooth', block:'start'});
      setTimeout(function(){ focusNode(addr); }, 300);
    }
    return;
  }
  if (el.hasAttribute('data-copy')) {
    var txt = el.getAttribute('data-copy');
    if (txt) navigator.clipboard.writeText(txt).then(function(){ el.textContent='\u2713'; setTimeout(function(){ el.textContent='\u{1F4CB}'; }, 1200); });
    return;
  }
  if (el.hasAttribute('data-trace')) {
    var a2 = el.getAttribute('data-trace');
    if (a2) alert('BFS: ' + a2 + '\nBackend required');
    return;
  }
});

/* ═══════════════════════════════════════
   Constants & State
   ═══════════════════════════════════════ */
var EMO = {seller:'\u{1F534}',traced:'\u{1F7E1}',exchange:'\u{1F3E6}',mixer:'\u{1F500}',multisig:'\u{1F91D}',danger:'\u26A0\uFE0F',blacklist:'\u{1F6AB}',linked:'\u{1F517}',sender:'\u25FB\uFE0F'};
var PGSIZE = 15;
var S = {n:[], e:[], sel:null, cx:0, cy:0, z:0.30, evPg:1, rcPg:1};

function btc(sat) { return (sat / 1e8).toFixed(8); }
function usd2(sat) { return Math.round(sat / 1e8 * 65000); }
function fusd(n) { return '$' + Number(n || 0).toLocaleString(); }
function chainKey(v){ return String(v||'BTC').toUpperCase(); }
function chainCls(v){ var m={'BTC':'btc','ETH':'eth','BSC':'bsc','POLYGON':'polygon','ARBITRUM':'arbitrum','BASE':'base','OPTIMISM':'optimism','AVALANCHE':'avalanche'}; return m[chainKey(v)]||'eth'; }
function chainBadge(v){ var c=chainKey(v); return '<span class="chain-pill '+chainCls(c)+'">'+c+'</span>'; }
function chainSymbol(v){ var m={'BTC':'\u20bf','ETH':'\u039e','BSC':'BNB','POLYGON':'MATIC','ARBITRUM':'\u039e','BASE':'\u039e','OPTIMISM':'\u039e','AVALANCHE':'AVAX'}; return m[chainKey(v)]||'\u039e'; }
var CHAIN_COLORS = {BTC:'#f7931a',ETH:'#627eea',BSC:'#f3ba2f',POLYGON:'#8247e5',ARBITRUM:'#28a0f0',BASE:'#0052ff',OPTIMISM:'#ff0420',AVALANCHE:'#e84142'};
var CHAIN_COLORS_LIGHT = {BTC:'rgba(247,147,26,.55)',ETH:'rgba(98,126,234,.55)',BSC:'rgba(243,186,47,.55)',POLYGON:'rgba(130,71,229,.55)',ARBITRUM:'rgba(40,160,240,.55)',BASE:'rgba(0,82,255,.55)',OPTIMISM:'rgba(255,4,32,.55)',AVALANCHE:'rgba(232,65,66,.55)'};
function formatNative(v, chain){ var c=chainKey(chain); return (c==='BTC' ? (v / 1e8).toFixed(8) : (v / 1e18).toFixed(6)) + ' ' + c; }
function moneyLabel(v, chain){ var c=chainKey(chain); var usd = c==='BTC' ? usd2(v) : Math.round((v / 1e18) * 3500); return '<strong>' + formatNative(v, chain) + '</strong><br><span style="color:var(--muted);font-size:11px">'+chainSymbol(chain)+' ≈ ' + fusd(usd) + '</span>'; }
function sh(a) { if (!a || a.length < 16) return a || ''; return a.substring(0, 8) + '\u2026' + a.substring(a.length - 6); }
function alink(addr) { return '<span class="al" data-addr="' + escapeHtml(addr) + '">' + sh(addr) + '</span>'; }
function raddr(chain) {
  if (chain !== 'BTC') {
    var h = '0x';
    for (var j = 0; j < 40; j++) h += '0123456789abcdef'.charAt(Math.floor(Math.random() * 16));
    return h;
  }
  var a = 'bc1q';
  for (var i = 0; i < 38; i++) a += '0123456789abcdef'.charAt(Math.floor(Math.random() * 16));
  return a;
}
function rdate(y1, y2) { return new Date(new Date(y1,0,1).getTime() + Math.random() * (new Date(y2,11,31).getTime() - new Date(y1,0,1).getTime())).toISOString(); }

/* ═══════════════════════════════════════
   Demo data (fallback when API unavailable)
   ═══════════════════════════════════════ */
function genDemo() {
  var N = [], E = [], idx = 0;
  var CL = [{cx:-2000,cy:-1000,seeds:2,br:4,dp:3,src:'darkweb'},{cx:2200,cy:-700,seeds:1,br:3,dp:3,src:'telegram'},{cx:0,cy:1800,seeds:1,br:3,dp:3,src:'tx_analysis'}];
  var cats = ['traced','traced','exchange','mixer','traced','danger','traced','traced','multisig','traced'];
  var chains = ['BTC','ETH'];
  var rp = [['ransomware','mixer_used'],['exchange_cashout'],[],['high_volume'],[]];
  CL.forEach(function(cl) {
    var gn = [];
    for (var s = 0; s < cl.seeds; s++) { var chain = chains[(idx + s) % chains.length]; var n = mkN(idx++,'seller',true,0,cl.src,cl.cx+s*200,cl.cy,['seed_wallet','ransomware'], chain); N.push(n); gn.push(n); }
    for (var s2 = 0; s2 < cl.seeds; s2++) {
      var seed = gn[s2], sector = Math.PI*2/cl.br;
      for (var b = 0; b < cl.br; b++) {
        var angle = b * sector + s2 * 0.15, parent = seed;
        for (var d = 1; d <= cl.dp; d++) {
          var childChain = (Math.random() < 0.35 ? (seed.chain === 'BTC' ? 'ETH' : 'BTC') : seed.chain);
          var child = mkN(idx++, cats[(b*cl.dp+d)%cats.length], false, d, 'trace', seed.x+Math.cos(angle)*350*d, seed.y+Math.sin(angle)*350*d, rp[Math.floor(Math.random()*rp.length)], childChain);
          N.push(child); gn.push(child); E.push(mkE(parent, child)); parent = child;
        }
      }
    }
  });
  var lnk = mkN(idx++,'linked',false,5,'trace',200,-300,['linked'],'ETH'); lnk.label='Cross-link'; N.push(lnk);
  E.push(mkE(N[4],lnk)); var g1s=CL[0].seeds*(1+CL[0].br*CL[0].dp); if(g1s+3<N.length)E.push(mkE(lnk,N[g1s+3]));
  var snd = mkN(idx++,'sender',false,0,'tx_analysis',-2600,-1800,[],'BTC'); snd.label='TX Sender'; N.push(snd); E.push(mkE(snd,N[0]));
  separateNodes(N);
  return {nodes:N, edges:E};
}

function mkE(f,t) { var v=Math.floor(Math.random()*1e8)+250000; return {from_address:f.address,to_address:t.address,total_value_sat:v,total_value_usd:usd2(v),tx_count:Math.floor(Math.random()*10)+1,last_tx_time:rdate(2025,2026),txid:'tx_'+Math.random().toString(36).substring(2,14)}; }

function separateNodes(nodes) {
  var MIN_GAP = 150;
  for (var pass = 0; pass < 28; pass++) {
    for (var i = 0; i < nodes.length; i++) {
      for (var j = i + 1; j < nodes.length; j++) {
        var a = nodes[i], b = nodes[j];
        var dx = b.x - a.x, dy = b.y - a.y;
        var d = Math.sqrt(dx * dx + dy * dy) || 0.001;
        var ra = nodeR(a) + 18;
        var rb = nodeR(b) + 18;
        var want = Math.max(MIN_GAP, ra + rb + 26);
        if (d < want) {
          var push = (want - d) * 0.52;
          var ux = dx / d, uy = dy / d;
          if (!isFinite(ux) || !isFinite(uy)) {
            ux = Math.cos((i + 1) * 0.73);
            uy = Math.sin((j + 1) * 0.61);
          }
          a.x -= ux * push;
          a.y -= uy * push;
          b.x += ux * push;
          b.y += uy * push;
        }
      }
    }
  }
}

   API data loading + layout for real data

function loadFromAPI() {
  var minUsd = Number(document.getElementById('fUsd').value) || 0;
  var maxDepth = Number(document.getElementById('fDep').value) || 10;

  // Fetch ALL chains from server, filter client-side via checkboxes
  fetch('/api/graph/data?min_usd=' + minUsd + '&max_depth=' + maxDepth + '&chain=')
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(data) {
      if (data.nodes && data.nodes.length > 0) {
        layoutNodes(data.nodes, data.edges);
        S.n = data.nodes; S.e = data.edges;
        console.log('[Graph] Loaded ' + data.nodes.length + ' wallets from DB');
      } else {
        console.log('[Graph] DB empty');
        S.n = []; S.e = [];
      }
      renderMetrics(); renderTables(); render();
    })
    .catch(function(err) {
      console.warn('[Graph] API failed:', err.message);
      S.n = []; S.e = [];
      renderMetrics(); renderTables(); render();
    });
}

function layoutNodes(nodes, edges) {
  var i, j;

  for (i = 0; i < nodes.length; i++) {
    var n = nodes[i];
    n.x = 0; n.y = 0;
    if (!n.utxo_count) n.utxo_count = 0;
    if (!n.active_days) n.active_days = 0;
    if (!n.largest_tx_sat) n.largest_tx_sat = 0;
    if (!n.avg_tx_sat) n.avg_tx_sat = 0;
    if (!n.mixer_hops) n.mixer_hops = 0;
    if (!n.connected_exchanges) n.connected_exchanges = 0;
    if (!n.created_at) n.created_at = n.last_seen_at || '';
    if (!n.chain) n.chain = /^0x/i.test(n.address || '') ? 'ETH' : 'BTC';
  }

  var addrIdx = {};
  for (i = 0; i < nodes.length; i++) addrIdx[nodes[i].address] = i;

  var adj = {};
  for (j = 0; j < edges.length; j++) {
    var e = edges[j];
    if (!adj[e.from_address]) adj[e.from_address] = [];
    if (!adj[e.to_address]) adj[e.to_address] = [];
    adj[e.from_address].push(e.to_address);
    adj[e.to_address].push(e.from_address);
  }

  var seeds = [];
  for (i = 0; i < nodes.length; i++) if (nodes[i].is_seed) seeds.push(nodes[i]);
  if (!seeds.length && nodes.length) seeds.push(nodes[0]);

  var placed = {};
  var clusterCols = 2;
  var clusterGapX = 3200;
  var clusterGapY = 2500;

  for (var si = 0; si < seeds.length; si++) {
    var seed = seeds[si];
    if (placed[seed.address]) continue;

    var gridX = (si % clusterCols) * clusterGapX - ((clusterCols - 1) * clusterGapX / 2);
    var gridY = Math.floor(si / clusterCols) * clusterGapY;
    seed.x = gridX;
    seed.y = gridY;
    placed[seed.address] = true;

    var q = [{addr: seed.address, depth: 0}];
    var visited = {};
    visited[seed.address] = true;
    var byDepth = {0: [seed.address]};

    while (q.length) {
      var item = q.shift();
      var neigh = adj[item.addr] || [];
      for (var ni = 0; ni < neigh.length; ni++) {
        var nAddr = neigh[ni];
        if (visited[nAddr]) continue;
        visited[nAddr] = true;
        placed[nAddr] = true;
        var d = item.depth + 1;
        if (!byDepth[d]) byDepth[d] = [];
        byDepth[d].push(nAddr);
        q.push({addr: nAddr, depth: d});
      }
    }

    var depthKeys = Object.keys(byDepth).map(function(x){ return Number(x); }).sort(function(a,b){ return a-b; });
    for (var dk = 1; dk < depthKeys.length; dk++) {
      var depth = depthKeys[dk];
      var ring = byDepth[depth];
      ring.sort(function(a, b) {
        var na = nodes[addrIdx[a]], nb = nodes[addrIdx[b]];
        if (na.chain !== nb.chain) return na.chain === 'BTC' ? -1 : 1;
        if (na.category !== nb.category) return String(na.category).localeCompare(String(nb.category));
        return String(na.address).localeCompare(String(nb.address));
      });

      var radiusX = 480 + depth * 300;
      var radiusY = 250 + depth * 185;
      var laneShift = depth * 35;
      var count = ring.length;

      for (var ri = 0; ri < count; ri++) {
        var addr = ring[ri];
        var node = nodes[addrIdx[addr]];
        var baseAngle = (-Math.PI / 2) + (2 * Math.PI * ri / Math.max(count, 1));
        var chainOffset = node.chain === 'ETH' ? 90 : -90;
        var categoryNudge = (node.category === 'exchange' ? 40 : node.category === 'mixer' ? -30 : 0);
        node.x = gridX + Math.cos(baseAngle) * (radiusX + categoryNudge);
        node.y = gridY + Math.sin(baseAngle) * (radiusY + laneShift) + chainOffset;
      }
    }
  }

  var orphanX = -2600, orphanY = 3400, orphanCol = 0;
  for (i = 0; i < nodes.length; i++) {
    if (!placed[nodes[i].address]) {
      nodes[i].x = orphanX + (orphanCol % 8) * 320;
      nodes[i].y = orphanY + Math.floor(orphanCol / 8) * 260;
      orphanCol++;
    }
  }

  separateNodes(nodes);

  for (var relax = 0; relax < 8; relax++) {
    for (j = 0; j < edges.length; j++) {
      var ed = edges[j];
      var aIdx = addrIdx[ed.from_address], bIdx = addrIdx[ed.to_address];
      if (aIdx === undefined || bIdx === undefined) continue;
      var a = nodes[aIdx], b = nodes[bIdx];
      var dx2 = b.x - a.x, dy2 = b.y - a.y;
      var dist = Math.sqrt(dx2 * dx2 + dy2 * dy2) || 1;
      var desired = 240 + Math.abs((a.depth || 0) - (b.depth || 0)) * 110;
      if (dist > desired) {
        var pull = (dist - desired) * 0.02;
        var ux2 = dx2 / dist, uy2 = dy2 / dist;
        a.x += ux2 * pull;
        a.y += uy2 * pull;
        b.x -= ux2 * pull;
        b.y -= uy2 * pull;
      }
    }
    separateNodes(nodes);
  }
}

function getFilters() {
  var chains = [];
  var cbs = document.querySelectorAll('#chainFilters input[type=checkbox]');

}
function filtered() {
  var f = getFilters(), addrSet = {};
  var fn = S.n.filter(function(n) { if(f.chains.length>0 && f.chains.indexOf(chainKey(n.chain))===-1)return false; if(f.cat&&n.category!==f.cat)return false; if(n.depth>f.md)return false; if(f.src&&n.source!==f.src)return false; return true; });
  fn.forEach(function(n) { addrSet[n.address] = true; });

function focusNode(addr) {

  if (!n) return;

function screenToWorld(sx, sy) { var r=document.getElementById('gC').getBoundingClientRect(); return {x:(sx-r.width/2)/S.z-S.cx, y:(sy-r.height/2)/S.z-S.cy}; }

  var flags = [];

  function topLinks(arr, direction) {

    for (var k = 0; k < limit; k++) { result += '<div style="font-size:11px;margin:2px 0">' + chainBadge(arr[k].node.chain) + ' ' + alink(arr[k].node.address) + ' ' + direction + ' <strong>' + formatNative(arr[k].edge.total_value_sat, arr[k].node.chain) + '</strong></div>'; }

  h += '</div></div>';
  h += row('Chain', chainBadge(node.chain));
  h += row('Balance', moneyLabel(node.balance_sat, node.chain));
  h += row('Received', formatNative(node.total_received_sat, node.chain) + ' <span style="font-size:10px;color:var(--muted)">(' + fusd(usd2(node.total_received_sat)) + ')</span>');
  h += row('Sent', formatNative(node.total_sent_sat, node.chain));
  h += row('TX Count', String(node.tx_count));
  h += row('UTXOs', String(node.utxo_count || '-'));
  h += row('Active', String(node.active_days || '-') + ' days');
  h += row('First TX', escapeHtml(fmtDate(node.first_seen_at)));
  h += row('Last TX', escapeHtml(fmtDate(node.last_seen_at)));
  h += row('Source', escapeHtml(srcLabels[node.source] || node.source || '-') + (node.source_detail ? '<div style="font-size:10px;color:var(--muted)">' + escapeHtml(node.source_detail) + '</div>' : ''));
  h += row('Risk Score', '<strong>' + node.risk_score + '/100</strong>');
  h += row('Tags', '<div style="display:flex;flex-wrap:wrap;gap:4px;justify-content:flex-end">' + tagsHTML + '</div>');
  h += row('Flow', '<div style="font-size:11px">IN: <strong>' + formatNative(totalIn, node.chain) + '</strong> (' + incoming.length + ')<br>OUT: <strong>' + formatNative(totalOut, node.chain) + '</strong> (' + outgoing.length + ')<br>Max: ' + formatNative(node.largest_tx_sat||0, node.chain) + '<br>Avg: ' + formatNative(node.avg_tx_sat||0, node.chain) + '</div>');
  h += row('Top In', topLinks(incoming, '\u2192'));
  h += row('Top Out', topLinks(outgoing, '\u2190'));
  var flagsHTML = '';
  if (flags.length > 0) { for (var fi = 0; fi < flags.length; fi++) flagsHTML += '<div style="font-size:11px">\u26A0 ' + escapeHtml(flags[fi]) + '</div>'; }
  else { flagsHTML = '<span style="color:var(--muted)">None</span>'; }
  h += row('Flags', flagsHTML);
  h += row('Links', '<div style="font-size:12px;line-height:1.7">' + depthHTML + '</div>');
  if (node.notes) h += row('Notes', '<span style="font-size:11px">' + escapeHtml(node.notes) + '</span>');
  h += '<div class="da"><a class="btn sm primary" href="' + explorerLink(node) + '" target="_blank">Explorer</a>';
  h += '<button class="btn sm ghost" data-trace="' + escapeHtml(node.address) + '">Trace</button></div>';
  box.innerHTML = h;
}

/* ═══════════════════════════════════════
   Tables with Pagination
   ═══════════════════════════════════════ */
function renderTables() {
  var data = filtered(), nodes = data.nodes, edges = data.edges;
  var events = [];
  for (var i = 0; i < edges.length; i++) {
    var e = edges[i], fromN = null, toN = null;
    for (var j = 0; j < S.n.length; j++) { if(S.n[j].address===e.from_address)fromN=S.n[j]; if(S.n[j].address===e.to_address)toN=S.n[j]; }
    if (fromN && toN) events.push({time:e.last_tx_time, from:fromN, to:toN, usd3:e.total_value_usd});
  }
  events.sort(function(a,b) { return new Date(b.time) - new Date(a.time); });
  var evT = events.length, evP = Math.max(1, Math.ceil(evT/PGSIZE)); if(S.evPg>evP)S.evPg=evP;
  var evS = events.slice((S.evPg-1)*PGSIZE, S.evPg*PGSIZE);
  document.getElementById('evCnt').textContent = evT + ' total';
  document.getElementById('evPage').textContent = 'Page ' + S.evPg + ' / ' + evP;
  document.getElementById('evPrev').disabled = S.evPg <= 1;
  document.getElementById('evNext').disabled = S.evPg >= evP;
  var evH = '<table><colgroup><col style="width:24%"><col style="width:26%"><col style="width:4%"><col style="width:26%"><col style="width:20%"></colgroup><thead><tr><th>Time</th><th>From</th><th></th><th>To</th><th>Amount</th></tr></thead><tbody>';
  for (var ei = 0; ei < evS.length; ei++) { var ev = evS[ei]; evH += '<tr><td style="font-size:10px">' + escapeHtml(fmtDate(ev.time)) + '</td><td>' + chainBadge(ev.from.chain) + ' ' + alink(ev.from.address) + '</td><td style="color:var(--muted);text-align:center">\u2192</td><td>' + chainBadge(ev.to.chain) + ' ' + alink(ev.to.address) + '</td><td style="font-weight:800;text-align:right">' + fusd(ev.usd3) + '</td></tr>';  }
  if (!evS.length) evH += '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:20px">No data</td></tr>';
  evH += '</tbody></table>';
  document.getElementById('evTbl').innerHTML = evH;

  var sorted = nodes.slice().sort(function(a,b) { return new Date(b.created_at||0) - new Date(a.created_at||0); });
  var rcT = sorted.length, rcP = Math.max(1, Math.ceil(rcT/PGSIZE)); if(S.rcPg>rcP)S.rcPg=rcP;
  var rcS = sorted.slice((S.rcPg-1)*PGSIZE, S.rcPg*PGSIZE);
  document.getElementById('rcCnt').textContent = rcT + ' total';
  document.getElementById('rcPage').textContent = 'Page ' + S.rcPg + ' / ' + rcP;
  document.getElementById('rcPrev').disabled = S.rcPg <= 1;
  document.getElementById('rcNext').disabled = S.rcPg >= rcP;
  var rcH = '<table><colgroup><col style="width:14%"><col style="width:14%"><col style="width:30%"><col style="width:18%"><col style="width:10%"><col style="width:14%"></colgroup><thead><tr><th>Chain</th><th>Type</th><th>Address</th><th>Balance</th><th>Depth</th><th>Source</th></tr></thead><tbody>'; 
  for (var ri = 0; ri < rcS.length; ri++) { var rn = rcS[ri]; rcH += '<tr><td>' + chainBadge(rn.chain) + '</td><td style="font-size:11px;font-weight:800">' + escapeHtml(rn.category) + '</td><td>' + alink(rn.address) + '</td><td style="font-weight:800;text-align:right">' + formatNative(rn.balance_sat, rn.chain) + '</td><td style="text-align:center">' + rn.depth + '</td><td style="font-size:10px">' + escapeHtml(rn.source||'-') + '</td></tr>'; }
  rcH += '</tbody></table>';
  document.getElementById('rcTbl').innerHTML = rcH;
}

/* ═══════════════════════════════════════
   Metrics + Toolbar + Analysis (REAL API)
   ═══════════════════════════════════════ */
function renderMetrics() {
  var d = filtered(), n = d.nodes, e = d.edges;
  var seedC=0, linkC=0, txC=0, vol=0, chainCounts={};
  for(var i=0;i<n.length;i++){
    if(n[i].is_seed)seedC++;
    if(n[i].category==='linked')linkC++;
    var ck=chainKey(n[i].chain);
    chainCounts[ck]=(chainCounts[ck]||0)+1;
  }
  for(var j=0;j<e.length;j++){txC+=e[j].tx_count;vol+=e[j].total_value_usd;}
  var cards = [];
  var chainOrder=['BTC','ETH','BSC','POLYGON','ARBITRUM','BASE','OPTIMISM','AVALANCHE'];
  for(var ci=0;ci<chainOrder.length;ci++){
    var cc=chainOrder[ci];
    if(chainCounts[cc]) cards.push({label:cc+' Wallets',value:chainCounts[cc],foot:cc});
  }
  // Add any chains not in the predefined order
  for(var ck2 in chainCounts){ if(chainOrder.indexOf(ck2)===-1) cards.push({label:ck2+' Wallets',value:chainCounts[ck2],foot:ck2}); }
  cards.push({label:'Seeds',value:seedC,foot:'Crawled'});
  cards.push({label:'TX',value:txC.toLocaleString(),foot:'Transactions'});
  cards.push({label:'Volume',value:fusd(vol),foot:'USD total'});
  renderMetricCards(document.getElementById('wM'), cards);
}

function setupToolbar() {
  document.getElementById('rzBtn').addEventListener('click', function() { S.z=0.30;S.cx=0;S.cy=0;render(); });
  document.getElementById('fsBtn').addEventListener('click', function() { var ss=[]; for(var i=0;i<S.n.length;i++){if(S.n[i].is_seed)ss.push(S.n[i]);} if(!ss.length)return; var ax=0,ay=0; for(var j=0;j<ss.length;j++){ax+=ss[j].x;ay+=ss[j].y;} S.cx=-ax/ss.length;S.cy=-ay/ss.length;S.z=0.55;render(); });
  document.getElementById('ziBtn').addEventListener('click', function() { S.z=Math.min(15,S.z*1.3);render(); });
  document.getElementById('zoBtn').addEventListener('click', function() { S.z=Math.max(0.04,S.z*0.7);render(); });
}

function setupAnalysis() {
  document.getElementById('aBtn').addEventListener('click', function() {
    var input = document.getElementById('aIn').value.trim();
    var typeEl = document.querySelector('input[name="iT"]:checked');
    var type = typeEl ? typeEl.value : 'address';
    if (!input) return;

    var url, body;
    if (type === 'txid') {
      url = '/api/graph/analyze/transaction';
      body = {txid: input, max_depth: Number(document.getElementById('fDep').value)||10, min_usd: Number(document.getElementById('fUsd').value)||2500};
    } else {
      url = '/api/graph/analyze/address';
      body = {address: input, max_depth: Number(document.getElementById('fDep').value)||10, min_usd: Number(document.getElementById('fUsd').value)||2500, source: 'darkweb'};
    }

    var btn = document.getElementById('aBtn');
    btn.textContent = '분석 중...'; btn.disabled = true;

    fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)})
      .then(function(r) { return r.json(); })
      .then(function(data) {
        btn.textContent = '분석 시작'; btn.disabled = false;
        if (data.status === 'started') {
          alert('분석이 백그라운드에서 시작되었습니다!\n\n' + (type==='txid'?'TX: ':'주소: ') + input + '\n\n잠시 후 Refresh를 눌러 결과를 확인하세요.');
        } else {
          alert('오류: ' + (data.error || JSON.stringify(data)));
        }
      })
      .catch(function(err) {
        btn.textContent = '분석 시작'; btn.disabled = false;
        alert('API 호출 실패: ' + err.message + '\n\n서버가 실행 중인지 확인하세요.');
      });
  });

  document.getElementById('aAdd').addEventListener('click', function() {
    var input = document.getElementById('aIn').value.trim();
    if (!input) return;
    fetch('/api/graph/analyze/address', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({address:input, max_depth:0, min_usd:999999999, source:'darkweb'})})
      .then(function(r) { return r.json(); })
      .then(function(d) { alert(d.status==='started' ? 'DB에 추가되었습니다: '+input : 'Error: '+(d.error||'')); })
      .catch(function(e) { alert('Failed: '+e.message); });
  });
}

function setupPagination() {
  document.getElementById('evPrev').addEventListener('click', function() { if(S.evPg>1){S.evPg--;renderTables();} });
  document.getElementById('evNext').addEventListener('click', function() { S.evPg++;renderTables(); });
  document.getElementById('rcPrev').addEventListener('click', function() { if(S.rcPg>1){S.rcPg--;renderTables();} });
  document.getElementById('rcNext').addEventListener('click', function() { S.rcPg++;renderTables(); });
}

['fCat','fUsd','fDep','fSrc'].forEach(function(id) {
  document.getElementById(id).addEventListener('change', function() { S.evPg=1;S.rcPg=1;renderMetrics();renderTables();render(); });
});
// Chain checkbox filters
var chainCbs = document.querySelectorAll('#chainFilters input[type=checkbox]');
for (var ci = 0; ci < chainCbs.length; ci++) {
  chainCbs[ci].addEventListener('change', function() { S.evPg=1;S.rcPg=1;renderMetrics();renderTables();render(); });
}

var resizeTimer;
window.addEventListener('resize', function() { clearTimeout(resizeTimer); resizeTimer=setTimeout(render,100); });

/* ═══════════════════════════════════════
   INIT — loads from API, falls back to demo
   ═══════════════════════════════════════ */
(function() {
  setupInteraction();
  setupAnalysis();
  setupToolbar();
  setupPagination();
  loadFromAPI();

  var focusAddr = qsParam('focus');
  if (focusAddr) setTimeout(function() { focusNode(focusAddr); }, 800);

  attachRefresh(function() {
    S.sel = null; S.evPg = 1; S.rcPg = 1;
    renderDetail(null);
    loadFromAPI();
  });

  setInterval(function(){
    var active = document.activeElement;
    if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) return;
    loadFromAPI();
  }, 5000);
})();
</script>
