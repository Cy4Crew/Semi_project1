<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Darkweb Monitor · Analytics</title>
  <link rel="stylesheet" href="/ui/assets/styles.css" />
</head>
<body>
<script src="/ui/assets/common.js"></script>
<script>
installPage({
  pageKey: 'analytics',
  heroEyebrow: 'Advanced Statistics',
  heroTitle: 'Analytics Console',
  heroDesc: '현재 API 범위에서 뽑아낼 수 있는 고급 시각화를 한 화면에 모았다. 긴 IOC 값 때문에 레이아웃이 깨지지 않게 repeated 목록도 정리한 버전이다.',
  heroMeta: ['repeated IOC', 'target load', 'status split', 'activity histogram'],
  actionHtml: '<button class="btn primary" id="heroRefreshBtn">Refresh</button>',
  sidebarExtra: `
    <div class="card-title">Analytics Range</div>
    <div class="mini-desc">recent 데이터 기준으로 계산한다.</div>
    <div class="mini-desc">상세 판정은 Investigation과 Graph를 같이 보는 게 맞다.</div>`,
  mainHtml: `
    <div class="hidden empty" id="errorBox"></div>
    <section class="metrics" id="metricGrid"></section>
    <section class="analytics-grid">
      <section class="panel">
        <div class="panel-head"><div><div class="panel-title">Repeated IOC Top 10</div><div class="panel-sub">같은 matched value 반복 기준</div></div></div>
        <div class="bar-list" id="repeatList"></div>
      </section>
      <section class="panel">
        <div class="panel-head"><div><div class="panel-title">Target Load</div><div class="panel-sub">target별 hit 수</div></div></div>
        <div class="chart-box"><canvas id="targetChart"></canvas></div>
      </section>
      <section class="panel">
        <div class="panel-head"><div><div class="panel-title">Alert Status Split</div><div class="panel-sub">최근 전송 상태 분포</div></div></div>
        <div class="chart-box"><canvas id="alertChart"></canvas></div>
      </section>
      <section class="panel">
        <div class="panel-head"><div><div class="panel-title">Hit Type Split</div><div class="panel-sub">watch_type 기준 분포</div></div></div>
        <div class="chart-box"><canvas id="typeChart"></canvas></div>
      </section>
      <section class="panel" style="grid-column: 1 / -1;">
        <div class="panel-head"><div><div class="panel-title">Activity Histogram</div><div class="panel-sub">시간대별 hit 발생 분포</div></div></div>
        <div class="chart-box"><canvas id="timeChart"></canvas></div>
      </section>
    </section>`
});

function renderBarList(el, entries) {
  const max = Math.max(...entries.map(x => x[1]), 1);
  el.innerHTML = entries.map(([label, value]) => `
    <div class="bar-row">
      <div class="bar-meta"><span class="value-strong">${escapeHtml(label || '-')}</span><span>${escapeHtml(value)}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${(value / max) * 100}%"></div></div>
    </div>`).join('') || '<div class="empty">데이터 없음</div>';
}
async function load() {
  const [summary, hits, alerts, targets] = await Promise.all([
    getJson(API.summary),
    getJson(API.hits(1, 150)),
    getJson(API.alerts(1, 150)),
    getJson(API.targets),
  ]);
  const hitRows = Array.isArray(hits) ? hits : [];
  const alertRows = Array.isArray(alerts) ? alerts : [];
  const targetRows = Array.isArray(targets) ? targets : [];

  const repeatMap = {};
  hitRows.forEach(h => {
    const key = String(h.matched_value || '').trim();
    if (!key) return;
    repeatMap[key] = (repeatMap[key] || 0) + 1;
  });
  const repeatedTop = Object.entries(repeatMap).filter(([,v]) => v > 1).sort((a,b) => b[1]-a[1]).slice(0, 10);
  const targetCounts = {};
  hitRows.forEach(h => {
    const key = String(h.target_id || 'unknown');
    const found = targetRows.find(t => String(t.id) === key);
    const label = found?.label || found?.name || `Target ${key}`;
    targetCounts[label] = (targetCounts[label] || 0) + 1;
  });
  const typeCounts = countBy(hitRows, 'watch_type');
  const alertCounts = countBy(alertRows, 'status');

  const hours = Array.from({length: 24}, (_,i) => [String(i).padStart(2, '0'), 0]);
  hitRows.forEach(h => {
    const d = new Date(h.last_seen_at || h.first_seen_at || 0);
    if (Number.isNaN(d.getTime())) return;
    const hour = d.getHours();
    hours[hour][1] += 1;
  });

  renderMetricCards(document.getElementById('metricGrid'), [
    { label: 'Targets', value: summary.targets || 0, foot: 'summary 기준' },
    { label: 'Recent Hits', value: hitRows.length, foot: 'loaded recent hits' },
    { label: 'Repeated IOC', value: repeatedTop.length, foot: '2회 이상 반복' },
    { label: 'Alert Failures', value: (alertCounts.failed || 0) + (alertCounts.error || 0), foot: '최근 전송 실패' },
    { label: 'Top Type', value: topEntries(typeCounts, 1)[0]?.[0] || '-', foot: '최근 hit type' },
  ]);

  renderBarList(document.getElementById('repeatList'), repeatedTop);
  drawBars('targetChart', Object.keys(targetCounts).slice(0, 8), Object.values(targetCounts).slice(0, 8), [
    ['#5ad1ff', '#5679ff'],
    ['#5bf0bf', '#2fd187'],
    ['#ffbe5c', '#ff8a5b'],
    ['#9d8bff', '#5f6bff'],
  ]);
  drawBars('alertChart', Object.keys(alertCounts), Object.values(alertCounts), [
    ['#5bf0bf', '#2fd187'],
    ['#ff8b9b', '#ff5c78'],
    ['#ffbe5c', '#ff8a5b'],
    ['#5ad1ff', '#5679ff'],
  ]);
  drawBars('typeChart', Object.keys(typeCounts), Object.values(typeCounts), [
    ['#5ad1ff', '#5679ff'],
    ['#5bf0bf', '#2fd187'],
    ['#ffbe5c', '#ff8a5b'],
    ['#9d8bff', '#5f6bff'],
  ]);
  drawBars('timeChart', hours.map(x => x[0]), hours.map(x => x[1]), [
    ['#5ad1ff', '#5679ff'],
    ['#5bf0bf', '#2fd187'],
    ['#ffbe5c', '#ff8a5b'],
    ['#9d8bff', '#5f6bff'],
  ]);
}
attachRefresh(() => guardedLoad(load));
window.addEventListener('resize', () => guardedLoad(load));
guardedLoad(load);
</script>
</body>
</html>
