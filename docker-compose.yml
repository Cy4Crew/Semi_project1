services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: intel
      POSTGRES_USER: intel
      POSTGRES_PASSWORD: intelpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./analyzer/schema_wallet_tracker.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intel -d intel"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  tor:
    image: osminogin/tor-simple:latest
    ports:
      - "9050:9050"

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
      tor:
        condition: service_started
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./evidence:/app/evidence
      - ./ui:/app/ui
      - ./targets.json:/app/targets.json
      - ./watchlist.json:/app/watchlist.json
      - ./data:/app/data

  worker:
    build: .
    command: python -m analyzer.worker
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    restart: always
    volumes:
      - ./data:/app/data

volumes:
  pgdata:
