services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: intel
      POSTGRES_USER: intel
      POSTGRES_PASSWORD: intelpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./evidence:/app/evidence
      - ./ui:/app/ui

volumes:
  pgdata:
